limits:
- name: Per-program rate limit
  scope: client
  metric: varies
  limit: varies per Samsung developer program (SmartThings, Bixby, Knox, Tizen)
  notes: Samsung does not publish a single rate-limit policy; each developer program maintains its own
    limits, typically requiring partner sign-in to view.
policies:
- name: Program-Specific Limits
  description: Samsung's developer programs each define their own throttling and quotas, documented behind
    the developer portal sign-in.
- name: Backoff Strategy
  description: Honor Retry-After when present and apply exponential backoff with jitter.
