description: Rate-limits artifact for Samsung. Trimmed to a single umbrella entry pending manual reconciliation.
  Samsung exposes developer programs (SmartThings, Bixby, Tizen, Knox) through device partner agreements.
  Public API usage is generally free but partner-onboarded; commercial terms are negotiated through Samsung's
  developer relations team and not published as public price sheets.
