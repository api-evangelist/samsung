naftiko: 1.0.0-alpha2
info:
  label: Samsung SmartThings API — Apps
  description: 'Samsung SmartThings API — Apps. 2 operations. Lead operation: List Apps. Self-contained Naftiko capability
    covering one Samsung business surface.'
  tags:
  - Samsung
  - Apps
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAMSUNG_API_KEY: SAMSUNG_API_KEY
capability:
  consumes:
  - type: http
    namespace: smartthings-apps
    baseUri: https://api.smartthings.com/v1
    description: Samsung SmartThings API — Apps business capability. Self-contained, no shared references.
    resources:
    - name: apps
      path: /apps
      operations:
      - name: listapps
        method: GET
        description: List Apps
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: apps-appId
      path: /apps/{appId}
      operations:
      - name: getapp
        method: GET
        description: Get App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: appId
          in: path
          type: string
          description: App ID or app name.
          required: true
    authentication:
      type: bearer
      token: '{{env.SAMSUNG_API_KEY}}'
  exposes:
  - type: rest
    namespace: smartthings-apps-rest
    port: 8080
    description: REST adapter for Samsung SmartThings API — Apps. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/apps
      name: apps
      description: REST surface for apps.
      operations:
      - method: GET
        name: listapps
        description: List Apps
        call: smartthings-apps.listapps
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/apps/{appid}
      name: apps-appid
      description: REST surface for apps-appId.
      operations:
      - method: GET
        name: getapp
        description: Get App
        call: smartthings-apps.getapp
        with:
          appId: rest.appId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: smartthings-apps-mcp
    port: 9090
    transport: http
    description: MCP adapter for Samsung SmartThings API — Apps. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-apps
      description: List Apps
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: smartthings-apps.listapps
      outputParameters:
      - type: object
        mapping: $.
    - name: get-app
      description: Get App
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: smartthings-apps.getapp
      with:
        appId: tools.appId
      outputParameters:
      - type: object
        mapping: $.
