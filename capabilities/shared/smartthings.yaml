naftiko: "1.0.0-alpha1"

info:
  label: "Samsung SmartThings API"
  description: >-
    SmartThings REST API providing device control, location management, scene
    activation, automation rules, and event subscriptions for IoT and smart home
    integration. Base URL: https://api.smartthings.com/v1.
  tags:
    - Automations
    - Connected Devices
    - IoT
    - Locations
    - Rules
    - Scenes
    - Smart Home
    - SmartThings
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SMARTTHINGS_PAT: SMARTTHINGS_PAT

capability:
  consumes:
    - type: http
      namespace: smartthings
      baseUri: https://api.smartthings.com/v1
      description: "SmartThings REST API for IoT device and smart home management."
      authentication:
        type: bearer
        token: "{{SMARTTHINGS_PAT}}"
      resources:
        - name: devices
          path: /devices
          description: "Connected device management and control."
          operations:
            - name: list-devices
              method: GET
              description: "List all accessible SmartThings devices."
              inputParameters:
                - name: locationId
                  in: query
                  type: string
                  required: false
                  description: "Filter devices by location UUID."
                - name: capabilityId
                  in: query
                  type: string
                  required: false
                  description: "Filter by capability (e.g., switch, lock)."
                - name: max
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of devices (max 200)."
                - name: pageToken
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-device
              method: GET
              description: "Get details for a specific device."
              inputParameters:
                - name: deviceId
                  in: path
                  type: string
                  required: true
                  description: "Device UUID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-device
              method: DELETE
              description: "Remove a device from the SmartThings platform."
              inputParameters:
                - name: deviceId
                  in: path
                  type: string
                  required: true
                  description: "Device UUID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: device-status
          path: /devices/{deviceId}/status
          description: "Device attribute status retrieval."
          operations:
            - name: get-device-status
              method: GET
              description: "Get full status of all device components and capability attributes."
              inputParameters:
                - name: deviceId
                  in: path
                  type: string
                  required: true
                  description: "Device UUID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: device-commands
          path: /devices/{deviceId}/commands
          description: "Device capability command execution."
          operations:
            - name: execute-device-commands
              method: POST
              description: "Execute commands on a device component (e.g., switch.on, lock.lock)."
              inputParameters:
                - name: deviceId
                  in: path
                  type: string
                  required: true
                  description: "Device UUID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  commands: "{{tools.commands}}"
        - name: locations
          path: /locations
          description: "Location management."
          operations:
            - name: list-locations
              method: GET
              description: "List all accessible SmartThings locations."
              inputParameters:
                - name: pageToken
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-location
              method: POST
              description: "Create a new SmartThings location."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  countryCode: "{{tools.countryCode}}"
                  timeZoneId: "{{tools.timeZoneId}}"
        - name: location-detail
          path: /locations/{locationId}
          description: "Individual location management."
          operations:
            - name: get-location
              method: GET
              description: "Get a specific location's details."
              inputParameters:
                - name: locationId
                  in: path
                  type: string
                  required: true
                  description: "Location UUID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-location
              method: PUT
              description: "Update a location's properties."
              inputParameters:
                - name: locationId
                  in: path
                  type: string
                  required: true
                  description: "Location UUID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: delete-location
              method: DELETE
              description: "Delete a location and all associated devices."
              inputParameters:
                - name: locationId
                  in: path
                  type: string
                  required: true
                  description: "Location UUID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: rooms
          path: /locations/{locationId}/rooms
          description: "Room management within a location."
          operations:
            - name: list-rooms
              method: GET
              description: "List all rooms in a location."
              inputParameters:
                - name: locationId
                  in: path
                  type: string
                  required: true
                  description: "Location UUID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-room
              method: POST
              description: "Create a new room in a location."
              inputParameters:
                - name: locationId
                  in: path
                  type: string
                  required: true
                  description: "Location UUID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
        - name: scenes
          path: /scenes
          description: "Scene (saved device state configuration) management."
          operations:
            - name: list-scenes
              method: GET
              description: "List all scenes."
              inputParameters:
                - name: locationId
                  in: query
                  type: string
                  required: false
                  description: "Filter by location UUID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: scene-execute
          path: /scenes/{sceneId}/execute
          description: "Scene activation."
          operations:
            - name: execute-scene
              method: POST
              description: "Activate a scene."
              inputParameters:
                - name: sceneId
                  in: path
                  type: string
                  required: true
                  description: "Scene ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: rules
          path: /rules
          description: "Automation rule management."
          operations:
            - name: list-rules
              method: GET
              description: "List all automation rules."
              inputParameters:
                - name: locationId
                  in: query
                  type: string
                  required: false
                  description: "Filter by location UUID."
                - name: max
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-rule
              method: POST
              description: "Create an automation rule."
              inputParameters:
                - name: locationId
                  in: query
                  type: string
                  required: true
                  description: "Location UUID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  actions: "{{tools.actions}}"
        - name: subscriptions
          path: /subscriptions
          description: "Device event subscriptions for SmartApps."
          operations:
            - name: list-subscriptions
              method: GET
              description: "List all event subscriptions."
              inputParameters:
                - name: installedAppId
                  in: query
                  type: string
                  required: false
                  description: "Filter by installed app ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-subscription
              method: POST
              description: "Subscribe to device capability events."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  sourceType: "{{tools.sourceType}}"
                  device: "{{tools.device}}"
        - name: apps
          path: /apps
          description: "SmartApp registration management."
          operations:
            - name: list-apps
              method: GET
              description: "List all registered SmartApps."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-app
              method: GET
              description: "Get a specific SmartApp."
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "App ID or app name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: smartthings-api
      resources:
        - path: /v1/devices
          operations:
            - method: GET
              name: list-devices
              call: "smartthings.list-devices"
        - path: /v1/devices/{deviceId}/commands
          operations:
            - method: POST
              name: execute-device-commands
              call: "smartthings.execute-device-commands"
        - path: /v1/scenes/{sceneId}/execute
          operations:
            - method: POST
              name: execute-scene
              call: "smartthings.execute-scene"

    - type: mcp
      port: 9100
      namespace: smartthings-mcp
      transport: http
      tools:
        - name: list-devices
          call: "smartthings.list-devices"
        - name: get-device-status
          call: "smartthings.get-device-status"
        - name: execute-device-commands
          call: "smartthings.execute-device-commands"
        - name: execute-scene
          call: "smartthings.execute-scene"
