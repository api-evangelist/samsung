description: FOCUS-aligned FinOps artifact for Samsung. Pricing is gated; meters and principles describe
  the expected billing surface. Samsung exposes developer programs (SmartThings, Bixby, Tizen, Knox) through
  device partner agreements. Public API usage is generally free but partner-onboarded; commercial terms
  are negotiated through Samsung's developer relations team and not published as public price sheets.
