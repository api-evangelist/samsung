meters:
- name: api_requests
  unit: request
  aggregation: sum
  dimensions:
  - program
  - client_id
- name: device_count
  unit: device
  aggregation: max
  dimensions:
  - program
  - device_family
principles:
- name: Visibility
  description: Each Samsung developer program (SmartThings, Bixby, Knox, Tizen) exposes its own dashboard;
    aggregate usage across programs in a partner-side data store since Samsung does not provide a unified
    usage API.
- name: Allocation
  description: Allocate by program and client_id; tag downstream spend by Samsung partner agreement.
- name: Optimization
  description: Use webhooks and event subscriptions instead of polling devices; cache device metadata;
    consolidate registrations under a single partner account where program rules permit.
- name: Accountability
  description: The Samsung partner / developer-relations contact is accountable for program-level terms.
notes: Samsung exposes developer programs (SmartThings, Bixby, Tizen, Knox) through device partner agreements.
  Public API usage is generally free but partner-onboarded; commercial terms are negotiated through Samsung's
  developer relations team and not published as public price sheets.
